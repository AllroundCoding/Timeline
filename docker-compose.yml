version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timeline-app
    ports:
      - "3000:3000"
    volumes:
      # Persist database files across container restarts
      - timeline-data:/app/data
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  timeline-data:
    driver: local
