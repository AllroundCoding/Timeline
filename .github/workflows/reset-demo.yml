name: Weekly Demo Reset

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  reset-demo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Reset demo data
        run: node scripts/seed-demo.js 5000
        env:
          NODE_ENV: production
      
      - name: Backup database (optional)
        run: |
          mkdir -p backups
          cp -r data/users backups/users-$(date +%s)
          ls -la backups/
      
      - name: Commit and push changes
        run: |
          git config user.name "Demo Reset Bot"
          git config user.email "bot@example.com"
          git add -A
          git commit -m "chore: weekly demo reset" || echo "No changes to commit"
          git push || echo "No changes to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
